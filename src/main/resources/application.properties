# Identificacao basica da aplicacao e profile padrao
spring.application.name=stocklite
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Configuracao HTTP base da API
server.port=${SERVER_PORT:8080}
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/v1/api}

# Configuracao do Swagger / OpenAPI
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:false}
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:false}

# Configuracao de conexao com banco de dados
spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:org.postgresql.Driver}

# Configuracao do JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:none}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.default_schema=${APP_DB_SCHEMA:stocklite}

# Configuracao do Flyway
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.create-schemas=${FLYWAY_CREATE_SCHEMAS:true}
spring.flyway.default-schema=${APP_DB_SCHEMA:stocklite}
spring.flyway.schemas=${APP_DB_SCHEMA:stocklite}

# Configuracao de CORS
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:}
app.cors.allowed-methods=${APP_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
app.cors.allowed-headers=${APP_CORS_ALLOWED_HEADERS:*}
app.cors.exposed-headers=${APP_CORS_EXPOSED_HEADERS:}
app.cors.allow-credentials=${APP_CORS_ALLOW_CREDENTIALS:true}
app.cors.max-age=${APP_CORS_MAX_AGE:3600}

# Configuracao do JWT
app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:3600}

# Configuracao de envio de e-mail
app.mail.from=${APP_MAIL_FROM:}
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:false}
